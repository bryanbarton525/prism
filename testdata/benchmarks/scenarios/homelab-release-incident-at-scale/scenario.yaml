id: homelab-release-incident-at-scale
title: Homelab incident at scale (10 delegations + enterprise context)
description: >
  Same homelab incident as the base scenario, plus enterprise Cursor rules padding
  (~18k chars) loaded only in orchestrator-only mode, and two go-helper/go-scaffold
  delegations simulating hotfix work during the incident.

brief_file: brief.md

orchestrator_context_files:
  - context/cursor-rules.md
  - context/runbook-index.md
  - context/chat-history.md

delegations:
  - id: gh-pr
    agent_id: github-cli
    skill_names: [gh-pr-triage]
    task_file: tasks/gh-pr.md
    evidence_files: [evidence/gh-pr.json]
    mock_response_file: responses/gh-pr.txt

  - id: gh-actions
    agent_id: github-cli
    skill_names: [gh-actions-diagnostics]
    task_file: tasks/gh-actions.md
    evidence_files: [evidence/gh-actions.json]
    mock_response_file: responses/gh-actions.txt

  - id: k8s-triage
    agent_id: kubectl
    skill_names: [kubectl-triage]
    task_file: tasks/k8s-triage.md
    evidence_files: [evidence/k8s-pods.json]
    mock_response_file: responses/k8s-triage.txt

  - id: k8s-rollout
    agent_id: kubectl
    skill_names: [k8s-rollout-diagnostics]
    task_file: tasks/k8s-rollout.md
    evidence_files: [evidence/k8s-rollout.json]
    mock_response_file: responses/k8s-rollout.txt

  - id: argo-sync
    agent_id: argo
    skill_names: [argo-sync-health]
    task_file: tasks/argo-sync.md
    evidence_files: [evidence/argo-app.json]
    mock_response_file: responses/argo-sync.txt

  - id: argo-workflow
    agent_id: argo
    skill_names: [argo-workflow-debug]
    task_file: tasks/argo-workflow.md
    evidence_files: [evidence/argo-workflow.json]
    mock_response_file: responses/argo-workflow.txt

  - id: docs-harvest
    agent_id: web-docs-search
    skill_names: [docs-source-harvest]
    task_file: tasks/docs-harvest.md
    evidence_files: [evidence/docs-upgrade.md]
    mock_response_file: responses/docs-harvest.txt

  - id: release-notes
    agent_id: web-docs-search
    skill_names: [release-notes-scan]
    task_file: tasks/release-notes.md
    evidence_files: [evidence/release-notes.md]
    mock_response_file: responses/release-notes.txt

  - id: go-metrics-helper
    agent_id: go-helper
    skill_names: [go-helper-fn]
    task_file: extra-tasks/go-metrics-helper.md
    evidence_files: [evidence/k8s-pods.json]
    mock_response_file: extra-responses/go-metrics-helper.txt

  - id: go-incident-test
    agent_id: go-scaffold
    skill_names: [go-test-table]
    task_file: extra-tasks/go-incident-test.md
    evidence_files: [evidence/k8s-rollout.json]
    mock_response_file: extra-responses/go-incident-test.txt

assertions:
  required_phrases:
    - "#42"
    - "CI"
    - "CrashLoopBackOff"
    - "OutOfSync"
    - "workflow"
    - "breaking"
    - "payments-api"

synthesis:
  orchestrator_prompt_file: tasks/orchestrator-synthesis.md
  delegated_prompt_file: tasks/delegated-synthesis.md
