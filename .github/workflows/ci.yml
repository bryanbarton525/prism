name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing git tag to release (for example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build -v ./cmd/prism

  prepare-release:
    name: Prepare release tag
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
            case "${TAG}" in
              v*) ;;
              *)
                echo "release_tag must start with 'v' (got: ${TAG})" >&2
                exit 1
                ;;
            esac
            echo "Using manual release tag: ${TAG}"
            echo "release_tag=${TAG}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
            case "${TAG}" in
              v*) ;;
              *)
                echo "Tag push does not match v* (${TAG}); skipping release."
                echo "release_tag=" >> "${GITHUB_OUTPUT}"
                exit 0
                ;;
            esac
            echo "Using pushed release tag: ${TAG}"
            echo "release_tag=${TAG}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # push to main: create next patch tag and release from it.
          git fetch --tags --force
          HEAD_TAG="$(git tag --points-at HEAD --list 'v*' | sort -V | sed -n '$p')"
          if [ -n "${HEAD_TAG}" ]; then
            echo "HEAD already has release tag ${HEAD_TAG}"
            echo "release_tag=${HEAD_TAG}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          LATEST_TAG="$(git tag --list 'v*' | sort -V | sed -n '$p')"
          if [ -z "${LATEST_TAG}" ]; then
            NEXT_TAG="v0.1.0"
          else
            VERSION="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<EOF
          ${VERSION}
          EOF
            NEXT_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          if git rev-parse "${NEXT_TAG}" >/dev/null 2>&1; then
            echo "Tag ${NEXT_TAG} already exists; refusing to overwrite." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${NEXT_TAG}" -m "Release ${NEXT_TAG}"
          git push origin "${NEXT_TAG}"
          echo "Created and pushed ${NEXT_TAG}"
          echo "release_tag=${NEXT_TAG}" >> "${GITHUB_OUTPUT}"

  release-build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    needs: prepare-release
    if: needs.prepare-release.outputs.release_tag != ''
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: tar.gz
          - goos: linux
            goarch: arm64
            ext: tar.gz
          - goos: darwin
            goarch: amd64
            ext: tar.gz
          - goos: darwin
            goarch: arm64
            ext: tar.gz
          - goos: windows
            goarch: amd64
            ext: zip
          - goos: windows
            goarch: arm64
            ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate release tag
        run: |
          case "${RELEASE_TAG}" in
            v*) ;;
            *)
              echo "release_tag must start with 'v' (got: ${RELEASE_TAG})" >&2
              exit 1
              ;;
          esac

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          BIN_NAME="prism"
          if [ "${GOOS}" = "windows" ]; then
            BIN_NAME="prism.exe"
          fi
          go build -trimpath -ldflags "-s -w" -o "dist/${BIN_NAME}" ./cmd/prism

      - name: Package artifact
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          EXT: ${{ matrix.ext }}
        run: |
          VERSION="${RELEASE_TAG}"
          ARTIFACT="prism_${VERSION}_${GOOS}_${GOARCH}"
          if [ "${EXT}" = "zip" ]; then
            (cd dist && zip -q "${ARTIFACT}.zip" prism.exe)
          else
            (cd dist && tar -czf "${ARTIFACT}.tar.gz" prism)
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: prism_${{ env.RELEASE_TAG }}_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/prism_${{ env.RELEASE_TAG }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.ext }}
          if-no-files-found: error

  release-publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [prepare-release, release-build]
    if: needs.prepare-release.outputs.release_tag != ''
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
    permissions:
      contents: write

    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: prism_${{ env.RELEASE_TAG }}_*
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*
          generate_release_notes: true

  release-container:
    name: Publish container image
    runs-on: ubuntu-latest
    needs: [prepare-release, test]
    if: needs.prepare-release.outputs.release_tag != ''
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate release tag
        run: |
          case "${RELEASE_TAG}" in
            v*) ;;
            *)
              echo "release_tag must start with 'v' (got: ${RELEASE_TAG})" >&2
              exit 1
              ;;
          esac

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }}
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
