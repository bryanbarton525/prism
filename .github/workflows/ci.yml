name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build -v ./cmd/prism

  release-build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: tar.gz
          - goos: linux
            goarch: arm64
            ext: tar.gz
          - goos: darwin
            goarch: amd64
            ext: tar.gz
          - goos: darwin
            goarch: arm64
            ext: tar.gz
          - goos: windows
            goarch: amd64
            ext: zip
          - goos: windows
            goarch: arm64
            ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          BIN_NAME="prism"
          if [ "${GOOS}" = "windows" ]; then
            BIN_NAME="prism.exe"
          fi
          go build -trimpath -ldflags "-s -w" -o "dist/${BIN_NAME}" ./cmd/prism

      - name: Package artifact
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          EXT: ${{ matrix.ext }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARTIFACT="prism_${VERSION}_${GOOS}_${GOARCH}"
          if [ "${EXT}" = "zip" ]; then
            (cd dist && zip -q "${ARTIFACT}.zip" prism.exe)
          else
            (cd dist && tar -czf "${ARTIFACT}.tar.gz" prism)
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: prism_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/prism_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.ext }}
          if-no-files-found: error

  release-publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: release-build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: prism_${{ github.ref_name }}_*
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
